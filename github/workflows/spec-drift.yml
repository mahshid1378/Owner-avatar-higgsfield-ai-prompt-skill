name: spec-drift

# Wave C scheduled tripwire (refresh_specs.py). Weekly, pulls the live Higgsfield
# model catalog via the CLI and diffs it against the committed CLI baseline
# (specs/cli_baseline.json). DETECT-ONLY — it never writes specs or merges. On
# drift it opens/updates an issue; on auth failure it fails the job loudly.
#
# ── SETUP (one-time) ─────────────────────────────────────────────────────────
#   1. Authenticate the CLI locally:   higgsfield auth login
#   2. Add credentials as a repo secret named HIGGSFIELD_CREDENTIALS:
#        gh secret set HIGGSFIELD_CREDENTIALS < ~/.config/higgsfield/credentials.json
#   Until the secret exists, the job exits early with a clear error (it never
#   silently passes — a silent pass would falsely read as "specs are fresh").
#
# ── AUTH-REFRESH STORY ───────────────────────────────────────────────────────
#   The CLI access_token expires; its refresh_token extends the lifetime but
#   eventually lapses ("Session expired"). When it does, refresh_specs.py exits 1,
#   THIS JOB FAILS, and GitHub notifies you. Re-run `higgsfield auth login` and
#   update the secret. No fragile token auto-rotation — expiry is a loud,
#   actionable alert, which is exactly the three-exit-state contract the tool was
#   built around (0 fresh / 3 drift / 1 pull-failed).

on:
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC — ~3 weeks ahead of the 30-day staleness WARN
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  spec-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Higgsfield CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/higgsfield-ai/cli/main/install.sh | sh
          # The installer's bin dir varies; add the usual candidates and verify.
          for d in "$HOME/.local/bin" "$HOME/.higgsfield/bin" /usr/local/bin; do
            [ -d "$d" ] && echo "$d" >> "$GITHUB_PATH"
          done
          export PATH="$HOME/.local/bin:$HOME/.higgsfield/bin:/usr/local/bin:$PATH"
          higgsfield version || { echo "::error::Higgsfield CLI not on PATH after install — adjust the install step."; exit 1; }

      - name: Restore CLI credentials
        env:
          CREDS: ${{ secrets.HIGGSFIELD_CREDENTIALS }}
        run: |
          if [ -z "$CREDS" ]; then
            echo "::error::HIGGSFIELD_CREDENTIALS secret not set — see workflow header for setup."
            exit 1
          fi
          mkdir -p "$HOME/.config/higgsfield"
          printf '%s' "$CREDS" > "$HOME/.config/higgsfield/credentials.json"
          chmod 600 "$HOME/.config/higgsfield/credentials.json"

      - name: Run spec-drift tripwire
        id: drift
        run: |
          set +e
          OUT=$(python3 refresh_specs.py 2>&1); CODE=$?
          echo "$OUT"
          echo "$OUT" >> "$GITHUB_STEP_SUMMARY"
          {
            echo "report<<DRIFT_EOF"
            echo "$OUT"
            echo "DRIFT_EOF"
            echo "code=$CODE"
          } >> "$GITHUB_OUTPUT"
          exit 0   # branch on the code in later steps; never mask the three states

      - name: Auth/pull failure → fail loudly (re-auth needed)
        if: steps.drift.outputs.code == '1'
        run: |
          echo "::error::spec-drift pull failed (likely an expired session). Re-run 'higgsfield auth login' locally and update the HIGGSFIELD_CREDENTIALS secret."
          exit 1

      - name: Drift detected → open or update an issue
        if: steps.drift.outputs.code == '3'
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT: ${{ steps.drift.outputs.report }}
        run: |
          TITLE="spec drift detected — refresh the snapshot"
          BODY=$(printf 'The weekly spec-drift tripwire found live model changes since the committed baseline:\n\n```\n%s\n```\n\nNext: run the Tier 2 refresh (dump `models_explore` -> `python3 sync_specs.py`), audit `evals/cases/` in the same PR (v3.11.2/v3.11.3 lesson), then accept the new live surface with `python3 refresh_specs.py --update-baseline`.' "$REPORT")
          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
